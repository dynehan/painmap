<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빵지도 — 웹 앱 프로토타입 v2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 배경 장식 (전부 pointer-events:none, 기능과 무관) ===== -->
<div class="bg-decor" aria-hidden="true">
  <span class="blob blob-a"></span>
  <span class="blob blob-b"></span>
  <span class="blob blob-c"></span>
</div>

<!-- ===== 마스코트 SVG 심볼 정의 (재사용) ===== -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="mgBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFDD8C"/>
      <stop offset="100%" stop-color="#F5B23E"/>
    </linearGradient>
    <linearGradient id="mgCrust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3B24A"/>
      <stop offset="100%" stop-color="#D98A1E"/>
    </linearGradient>
  </defs>
  <symbol id="mascot" viewBox="0 0 120 128">
    <!-- 다리 -->
    <ellipse cx="46" cy="118" rx="9" ry="7" fill="url(#mgCrust)"/>
    <ellipse cx="70" cy="118" rx="9" ry="7" fill="url(#mgCrust)"/>
    <!-- 오른쪽(보는 방향 기준) 팔 - 아래로 내림 -->
    <path d="M84 66 Q100 74 96 90 Q94 98 84 96 Q78 94 80 86 Q82 76 84 66 Z" fill="url(#mgBody)"/>
    <circle cx="86" cy="93" r="9" fill="url(#mgBody)"/>
    <!-- 왼쪽 팔 - 위로 올려서 화이팅 포즈 -->
    <path d="M34 62 Q14 58 12 42 Q11 33 20 33 Q27 34 27 42 Q28 52 34 62 Z" fill="url(#mgBody)"/>
    <circle cx="18" cy="38" r="10" fill="url(#mgBody)"/>
    <!-- 몸통 (아래쪽 큰 덩어리) -->
    <ellipse cx="58" cy="82" rx="38" ry="34" fill="url(#mgBody)"/>
    <!-- 크루아상 결 (중간 tier) -->
    <ellipse cx="63" cy="52" rx="29" ry="26" fill="url(#mgCrust)"/>
    <ellipse cx="58" cy="82" rx="38" ry="34" fill="url(#mgBody)" opacity="0.001"/>
    <!-- 상단 tier -->
    <ellipse cx="67" cy="30" rx="19" ry="17" fill="url(#mgBody)"/>
    <!-- 꼭대기 말림 -->
    <circle cx="71" cy="14" r="10" fill="url(#mgCrust)"/>
    <!-- 결 라인 -->
    <path d="M52 28 Q67 22 80 30" stroke="#C97A18" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M42 50 Q63 40 84 50" stroke="#C97A18" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- 얼굴판 (밝은 크림톤 앞면) -->
    <path d="M24 66 Q22 100 40 112 Q58 120 76 110 Q90 100 88 72 Q86 54 60 52 Q30 52 24 66 Z" fill="#FBE2A6"/>
    <!-- 눈썹 (단호한 표정) -->
    <rect x="38" y="70" width="16" height="4.5" rx="2.2" fill="#221F19" transform="rotate(-9 46 72)"/>
    <rect x="63" y="70" width="16" height="4.5" rx="2.2" fill="#221F19" transform="rotate(9 71 72)"/>
    <!-- 눈 -->
    <ellipse cx="45" cy="82" rx="6.5" ry="8" fill="#221F19"/>
    <ellipse cx="72" cy="82" rx="6.5" ry="8" fill="#221F19"/>
    <circle cx="47.5" cy="78" r="1.8" fill="#fff"/>
    <circle cx="74.5" cy="78" r="1.8" fill="#fff"/>
    <!-- 코 -->
    <circle cx="58" cy="90" r="4" fill="#A85B22"/>
    <!-- 입 -->
    <path d="M50 98 Q58 104 66 98" stroke="#221F19" stroke-width="3" fill="none" stroke-linecap="round"/>
  </symbol>
</svg>

<div class="app">
  <div class="topbar">
    <button type="button" class="logo" id="logo-home" aria-label="처음 화면으로 이동">
      <span class="brand-text">
        <span class="brand-sub">DAEJEON</span>
        <span class="brand-main">PANG MAP<span class="dot"></span></span>
      </span>
    </button>
    <span class="search">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="대전 지역 베이커리 검색" autocomplete="off">
    </span>
    <nav class="nav">
      <button class="nav-btn active" data-screen="map">
        <svg class="icon" viewBox="0 0 24 24"><path d="M9 20l-5.5-2.5V4.5L9 7m0 13l6-2m-6 2V7m6 11l5.5 2.5V6.5L15 4m0 14V4m0 0L9 6.5"/></svg>지도
      </button>
      <button class="nav-btn" data-screen="list">
        <svg class="icon" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>리스트
      </button>
      <button class="nav-btn" data-screen="chat">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>챗봇
      </button>
      <button class="nav-btn" data-screen="mypage">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>마이페이지
      </button>
    </nav>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="다크 모드 전환">
      <svg class="icon icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="icon icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
    </button>
    <div class="auth-actions" id="auth-actions">
      <button class="btn-outline" id="open-login">로그인</button>
      <button class="btn-solid" id="open-signup">회원가입</button>
    </div>
  </div>

  <main>
    <!-- 지도 화면 -->
    <section class="screen active" id="screen-map">
      <div class="map-canvas" id="map-canvas">
        <div class="map-hint"><img class="mascot-icon" src="character.png" alt="빵지도 캐릭터">마커를 눌러 빵집을 살펴보세요</div>
      </div>
      <div class="detail-panel" id="detail-panel">
        <div class="empty">
          <img class="mascot-icon" src="character.png" alt="빵지도 캐릭터">
          <p>지도에서 빵집을 클릭하면<br>상세 정보가 여기 표시돼요.</p>
        </div>
      </div>
      <button type="button" class="tray" id="tray"><span>선택함</span><span class="count" id="tray-count">0</span></button>
    </section>

    <!-- 리스트 화면 -->
    <section class="screen" id="screen-list">
      <div class="list-toolbar">
        <div class="section-title">대전 베이커리 목록</div>
        <div class="sort-wrap">
          <label for="sort-select">정렬</label>
          <select id="sort-select">
            <option value="name">이름순</option>
            <option value="near">내 주변 가까운 순</option>
            <option value="wishlist">찜 많은 순</option>
          </select>
        </div>
      </div>
      <div class="filter-bar">
        <div class="filter-chips" id="category-filters"></div>
        <div class="filter-group" id="price-filter">
          <button type="button" data-price="0" class="active">전체</button>
          <button type="button" data-price="1">저</button>
          <button type="button" data-price="2">중</button>
          <button type="button" data-price="3">고</button>
        </div>
        <label class="open-toggle">
          <input type="checkbox" id="open-only-toggle">
          <span>지금 영업중만</span>
        </label>
      </div>
      <div class="list-grid" id="list-grid"></div>
    </section>

    <!-- 경로 결과 화면 -->
    <section class="screen" id="screen-route">
      <div class="route-map" id="route-map"></div>
      <div class="route-body">
        <div class="rank-cards" id="rank-cards"></div>
        <div class="stop-list" id="stop-list"></div>
        <div class="route-actions">
          <button type="button" class="btn-outline" id="share-route-btn">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
            공유하기
          </button>
          <button type="button" class="btn-solid" id="save-course-btn">이 코스 저장하기</button>
        </div>
        <button class="time-toggle-btn" id="time-toggle">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
          전체 이동 시간 보기
        </button>
        <div class="mode-tabs" id="mode-tabs">
          <button class="mode-tab active" data-mode="walk">도보</button>
          <button class="mode-tab" data-mode="car">자동차</button>
          <button class="mode-tab" data-mode="bus">버스</button>
        </div>
        <div class="mode-result" id="mode-result" style="display:none;"></div>
      </div>
    </section>

    <!-- 챗봇 화면 -->
    <section class="screen" id="screen-chat">
      <div class="chat-log" id="chat-log">
        <div class="bubble-row bot">
          <img class="mascot-icon" src="character.png" alt="빵지도 캐릭터">
          <div class="bubble bot">안녕하세요! 오늘은 어떤 빵이 당기세요? (부가 기능 — 프로토타입 단계에서는 정해진 답변만 보여줘요)</div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" placeholder="예: 달달한 거 먹고 싶어" id="chat-input-field">
        <button id="chat-send">보내기</button>
      </div>
      <p class="chat-hint">실제 서비스에서는 LLM이 보유 데이터 중 적합한 곳을 추천합니다.</p>
    </section>

    <!-- 마이페이지 -->
    <section class="screen" id="screen-mypage">
      <div id="mypage-content"></div>
    </section>
  </main>

  <div class="app-footer">
    <span class="brand"><img class="mascot-icon" src="character.png" alt="빵지도 캐릭터">빵지도</span>
    <span>대전 베이커리 동선 추천 서비스 — 프로토타입 v2</span>
  </div>
</div>

<!-- 로그인 모달 -->
<div class="modal-wrap" id="login-modal">
  <div class="modal">
    <div class="modal-head"><img class="mascot-icon" src="character.png" alt="빵지도 캐릭터"><h2>로그인</h2></div>
    <div class="field"><label>아이디</label><input type="text" placeholder="아이디"></div>
    <div class="field"><label>비밀번호</label><input type="password" placeholder="비밀번호"></div>
    <div class="modal-actions">
      <button id="login-cancel">취소</button>
      <button class="primary" id="login-submit">로그인</button>
    </div>
    <p class="modal-switch" id="to-signup">계정이 없으신가요? 회원가입</p>
  </div>
</div>

<!-- 회원가입 모달 -->
<div class="modal-wrap" id="signup-modal">
  <div class="modal">
    <div class="modal-head"><img class="mascot-icon" src="character.png" alt="빵지도 캐릭터"><h2>회원가입</h2></div>
    <div class="field"><label>아이디</label><input type="text" placeholder="아이디" id="signup-id"></div>
    <div class="field"><label>비밀번호</label><input type="password" placeholder="비밀번호"></div>
    <div class="field">
      <label>빵 취향</label>
      <div class="checkgroup">
        <label><input type="checkbox" value="크루아상"><span>크루아상</span></label>
        <label><input type="checkbox" value="소금빵"><span>소금빵</span></label>
        <label><input type="checkbox" value="식빵"><span>식빵</span></label>
        <label><input type="checkbox" value="단팥빵"><span>단팥빵</span></label>
      </div>
    </div>
    <div class="field">
      <label>가본 곳</label>
      <div class="checkgroup">
        <label><input type="checkbox" value="성심당 본점"><span>성심당 본점</span></label>
        <label><input type="checkbox" value="하레하레"><span>하레하레</span></label>
      </div>
    </div>
    <div class="field">
      <label>가고 싶은 곳</label>
      <div class="checkgroup">
        <label><input type="checkbox" value="앤드유"><span>앤드유</span></label>
        <label><input type="checkbox" value="브레드메종"><span>브레드메종</span></label>
      </div>
    </div>
    <div class="modal-actions">
      <button id="signup-cancel">취소</button>
      <button class="primary" id="signup-submit">가입하기</button>
    </div>
  </div>
</div>

<!-- 코스 저장 모달 -->
<div class="modal-wrap" id="save-course-modal">
  <div class="modal">
    <div class="modal-head"><h2>코스 저장하기</h2></div>
    <div class="field"><label>코스 이름</label><input type="text" id="course-name-input" placeholder="예: 대학가 빵투어"></div>
    <div class="modal-actions">
      <button id="course-cancel">취소</button>
      <button class="primary" id="course-submit">저장</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ---------- 데이터 ---------- */
const demoNow = 19.5; // 데모용 현재 시각(24시간제, 소수=분). 상태 재현용으로 자유롭게 조절.

const bakeries = [
  { id: 1, name: '성심당 본점', menu: '튀김소보로', x: 22, y: 30, phone: '042-1234-5678',
    busy: '토·일 오후 2~4시', busyStart: 14, busyEnd: 16, openHour: 8, closeHour: 22,
    price: 2, category: ['식빵', '단팥빵'], rating: 4.6,
    reviews: ['튀김소보로는 역시 최고예요 :)', '평일에도 줄이 길지만 그만한 가치가 있어요'] },
  { id: 2, name: '하레하레', menu: '크루아상', x: 48, y: 18, phone: '042-2345-6789',
    busy: '평일 오전 10~11시', busyStart: 10, busyEnd: 11, openHour: 7, closeHour: 20,
    price: 3, category: ['크루아상'], rating: 4.4,
    reviews: ['버터향이 진한 크루아상이에요', '마감 전에 가야 원하는 종류를 구할 수 있어요'] },
  { id: 3, name: '앤드유', menu: '스콘', x: 38, y: 55, phone: '042-3456-7890',
    busy: '주말 오전 11시~1시', busyStart: 11, busyEnd: 13, openHour: 9, closeHour: 21,
    price: 1, category: ['스콘'], rating: 4.2,
    reviews: ['가성비 좋은 스콘 맛집', '내부가 아늑해서 앉아 먹기 좋아요'] },
  { id: 4, name: '브레드메종', menu: '식빵', x: 62, y: 48, phone: '042-4567-8901',
    busy: '평일 오후 6~7시', busyStart: 18, busyEnd: 19, openHour: 10, closeHour: 20,
    price: 2, category: ['식빵'], rating: 4.5,
    reviews: ['식빵 결이 부드러워요', '저녁엔 금방 품절되니 서둘러야 해요'] },
  { id: 5, name: '밀도베이커리', menu: '바게트', x: 16, y: 62, phone: '042-5678-9012',
    busy: '주말 오후 3~5시', busyStart: 15, busyEnd: 17, openHour: 8, closeHour: 22,
    price: 1, category: ['바게트'], rating: 4.1,
    reviews: ['겉바속촉 바게트예요', '가격도 착해서 자주 가요'] },
  { id: 6, name: '정든집빵집', menu: '단팥빵', x: 68, y: 22, phone: '042-6789-0123',
    busy: '평일 오전 9~10시', busyStart: 9, busyEnd: 10, openHour: 8, closeHour: 22,
    price: 2, category: ['단팥빵'], rating: 4.3,
    reviews: ['옛날 감성 단팥빵이에요', '사장님이 친절하세요'] },
];

const selected = new Set();
const wishlist = new Set();
const savedCourses = [];
let currentRoutes = [];
let activeRankIdx = 0;
let searchQuery = '';
const listFilters = { categories: new Set(), price: 0, openOnly: false, sort: 'name' };
const myLocation = { x: 40, y: 40 };
const rankColors = ['#F2A93B', '#3B6FE0', '#E1596B', '#3FA07D', '#8B6BD6', '#D6883A'];

const heartIcon = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.4 2.2 5 5.6 5c2 0 3.4 1.1 4.4 2.6C11 6.1 12.4 5 14.4 5c3.4 0 5.2 3.4 3.6 6.8C19.5 16.4 12 21 12 21z"/></svg>`;

/* ---------- 상태(마감임박/한산해요) ---------- */
function isOpenNow(b){ return demoNow >= b.openHour && demoNow < b.closeHour; }
function bakeryStatus(b){
  if (b.closeHour - demoNow <= 1) return 'closing';
  const busyNow = demoNow >= b.busyStart && demoNow < b.busyEnd;
  if (!busyNow) return 'quiet';
  return null;
}
function statusMeta(status){
  if (status === 'closing') return { label: '곧 마감', cls: 'closing' };
  if (status === 'quiet') return { label: '한산해요', cls: 'quiet' };
  return null;
}
function statusBadge(b, tag){
  const meta = statusMeta(bakeryStatus(b));
  if (!meta) return '';
  return `<span class="${tag} ${meta.cls}">${meta.label}</span>`;
}

/* ---------- 검색 ---------- */
function matchesSearch(b){
  const q = searchQuery.trim();
  if (!q) return true;
  return b.name.includes(q) || b.menu.includes(q);
}

/* ---------- 지도 화면 ---------- */
const mapCanvas = document.getElementById('map-canvas');
function renderMapPins(){
  mapCanvas.querySelectorAll('.pin').forEach(p => p.remove());
  bakeries.forEach(b => {
    const pin = document.createElement('button');
    pin.className = 'pin';
    if (selected.has(b.id)) pin.classList.add('selected');
    if (!matchesSearch(b)) pin.classList.add('dim');
    pin.style.left = b.x + '%';
    pin.style.top = b.y + '%';
    pin.dataset.id = b.id;
    const bubble = statusBadge(b, 'status-bubble');
    pin.innerHTML = `${bubble}<span class="dot"></span><span class="label">${b.name}</span>`;
    pin.addEventListener('click', () => toggleSelect(b.id));
    mapCanvas.appendChild(pin);
  });
}

function renderDetailPanel(){
  const panel = document.getElementById('detail-panel');
  const items = [...selected].map(id => bakeries.find(b => b.id === id));

  if (items.length === 0){
    panel.innerHTML = `
      <div class="empty">
        <img class="mascot-icon" src="character.png" alt="빵지도 캐릭터">
        <p>지도에서 빵집을 클릭하면<br>상세 정보가 여기 표시돼요.</p>
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div class="selection-summary">
      <span class="count-label">선택한 빵집 ${items.length}곳</span>
      ${items.length < 2 ? '<span class="select-hint">2곳 이상 선택해주세요</span>' : ''}
    </div>
    <div class="detail-panel-body" id="detail-panel-body"></div>
  `;

  const body = document.getElementById('detail-panel-body');
  items.forEach(b => {
    const liked = wishlist.has(b.id);
    const filled = Math.round(b.rating);
    const card = document.createElement('div');
    card.className = 'selection-card';
    card.innerHTML = `
      <button class="remove-btn" aria-label="${b.name} 선택 해제">✕</button>
      <div class="selection-card-head">
        <h4>${b.name}${statusBadge(b, 'status-chip')}</h4>
        <button type="button" class="heart-btn ${liked ? 'active' : ''}" aria-label="찜하기">${heartIcon}</button>
      </div>
      <div class="rating-row">${'★'.repeat(filled)}${'☆'.repeat(5 - filled)}<span>${b.rating.toFixed(1)}</span></div>
      <div class="detail-row"><span class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M18 8a6 6 0 00-12 0c0 7 6 13 6 13s6-6 6-13z"/><circle cx="12" cy="8" r="2.2"/></svg>대표 빵</span><span>${b.menu}</span></div>
      <div class="detail-row"><span class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.7a2 2 0 01-.4 2.1L8 9.9a16 16 0 006 6l1.4-1.4a2 2 0 012.1-.4c.9.3 1.8.5 2.7.6a2 2 0 011.7 2.1z"/></svg>전화</span><span>${b.phone}</span></div>
      <div class="detail-row" style="border-bottom:none"><span class="label"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>몰리는 시간</span><span>${b.busy}</span></div>
      <div class="review-list">${b.reviews.map(r => `<div class="review-item">“${r}”</div>`).join('')}</div>
    `;
    card.querySelector('.remove-btn').addEventListener('click', () => {
      selected.delete(b.id);
      syncSelectionUI();
    });
    card.querySelector('.heart-btn').addEventListener('click', () => toggleWishlist(b.id));
    body.appendChild(card);
  });
}

function toggleWishlist(id){
  if (wishlist.has(id)) wishlist.delete(id);
  else wishlist.add(id);
  renderDetailPanel();
  renderListGrid();
  renderMypage();
}

function toggleSelect(id){
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  syncSelectionUI();
}

function syncSelectionUI(){
  document.querySelectorAll('.pin').forEach(p => p.classList.toggle('selected', selected.has(Number(p.dataset.id))));
  document.querySelectorAll('.list-card').forEach(c => {
    const sel = selected.has(Number(c.dataset.id));
    c.classList.toggle('selected', sel);
    const selectBtn = c.querySelector('.select-btn');
    if (selectBtn) selectBtn.textContent = sel ? '선택됨' : '선택하기';
  });
  const tray = document.getElementById('tray');
  document.getElementById('tray-count').textContent = selected.size;
  tray.classList.toggle('show', selected.size > 0);
  tray.disabled = selected.size < 2;
  renderDetailPanel();
}

document.getElementById('tray').addEventListener('click', () => {
  if (selected.size >= 2) goToRoute();
});

/* ---------- 리스트 화면 ---------- */
const listGrid = document.getElementById('list-grid');

function createListCard(b){
  const liked = wishlist.has(b.id);
  const card = document.createElement('div');
  card.className = 'list-card';
  card.dataset.id = b.id;
  card.innerHTML = `
    <div class="thumb"></div>
    <div class="info">
      <div class="name">${b.name}${statusBadge(b, 'status-chip')}</div>
      <div class="menu">${b.menu} · ${'₩'.repeat(b.price)}</div>
      <div class="card-actions">
        <button type="button" class="select-btn">선택하기</button>
        <button type="button" class="heart-btn ${liked ? 'active' : ''}" aria-label="찜하기">${heartIcon}</button>
      </div>
    </div>`;
  if (selected.has(b.id)) card.classList.add('selected');
  if (!matchesSearch(b)) card.classList.add('dim');
  card.querySelector('.select-btn').textContent = selected.has(b.id) ? '선택됨' : '선택하기';
  card.querySelector('.select-btn').addEventListener('click', () => toggleSelect(b.id));
  card.querySelector('.heart-btn').addEventListener('click', () => toggleWishlist(b.id));
  return card;
}

function getFilteredSortedBakeries(){
  let list = bakeries.filter(b => {
    if (listFilters.categories.size && !b.category.some(c => listFilters.categories.has(c))) return false;
    if (listFilters.price && b.price !== listFilters.price) return false;
    if (listFilters.openOnly && !isOpenNow(b)) return false;
    if (!matchesSearch(b)) return false;
    return true;
  });
  if (listFilters.sort === 'near') list = [...list].sort((a, b) => dist(a, myLocation) - dist(b, myLocation));
  else if (listFilters.sort === 'wishlist') list = [...list].sort((a, b) => (wishlist.has(b.id) ? 1 : 0) - (wishlist.has(a.id) ? 1 : 0));
  else list = [...list].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  return list;
}

function renderListGrid(){
  listGrid.innerHTML = '';
  const list = getFilteredSortedBakeries();
  if (!list.length){
    listGrid.innerHTML = `<div class="list-empty">조건에 맞는 빵집이 없어요.</div>`;
    return;
  }
  list.forEach(b => listGrid.appendChild(createListCard(b)));
}

/* ---------- 동선 계산 ---------- */
function permutations(arr){
  if (arr.length <= 1) return [arr];
  const result = [];
  arr.forEach((item, i) => {
    const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
    permutations(rest).forEach(p => result.push([item, ...p]));
  });
  return result;
}
function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
function totalDistance(order){
  let sum = 0;
  for (let i = 0; i < order.length - 1; i++) sum += dist(order[i], order[i + 1]);
  return sum;
}
function sameRoute(a, b){
  if (a.length !== b.length) return false;
  const forward = a.every((v, i) => v.id === b[i].id);
  const backward = a.every((v, i) => v.id === b[b.length - 1 - i].id);
  return forward || backward;
}

function computeTopRoutes(){
  const chosen = [...selected].map(id => bakeries.find(b => b.id === id));
  const all = permutations(chosen).map(order => ({ order, dist: totalDistance(order) }));
  all.sort((a, b) => a.dist - b.dist);
  const top = [];
  for (const r of all) {
    if (top.some(t => sameRoute(t.order, r.order))) continue;
    top.push(r);
    if (top.length === 3) break;
  }
  return top;
}

function goToRoute(){
  currentRoutes = computeTopRoutes();
  activeRankIdx = 0;
  renderRoute();
  switchScreen('route');
}

function renderRoute(){
  // 순위 카드
  const rankLabels = ['가장 빠른 경로', '2순위', '3순위'];
  const cardsEl = document.getElementById('rank-cards');
  cardsEl.innerHTML = '';
  currentRoutes.forEach((r, i) => {
    const km = (r.dist * 0.35).toFixed(1);
    const card = document.createElement('div');
    card.className = 'rank-card' + (i === activeRankIdx ? ' active' : '');
    card.innerHTML = `<div class="tag">${i + 1}순위</div><div class="title">${rankLabels[i] || (i+1) + '순위'}</div><div class="meta">${r.order.map(b => b.name).join(' → ')}<br>약 ${km}km</div>`;
    card.addEventListener('click', () => { activeRankIdx = i; renderRoute(); });
    cardsEl.appendChild(card);
  });

  const chosenRoute = currentRoutes[activeRankIdx];
  if (!chosenRoute) return;

  // 리스트
  const stopList = document.getElementById('stop-list');
  stopList.innerHTML = '';
  chosenRoute.order.forEach((b, i) => {
    const color = rankColors[i % rankColors.length];
    const row = document.createElement('div');
    row.className = 'stop-item';
    row.style.borderLeftColor = color;
    row.innerHTML = `<span class="num">(${i + 1})</span><span>${b.name}</span>`;
    stopList.appendChild(row);
  });

  // 미니맵 (상단 30%)
  const routeMap = document.getElementById('route-map');
  routeMap.innerHTML = '';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'lines');
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.setAttribute('preserveAspectRatio', 'none');
  for (let i = 0; i < chosenRoute.order.length - 1; i++) {
    const a = chosenRoute.order[i], b = chosenRoute.order[i + 1];
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
    line.setAttribute('stroke', rankColors[(i + 1) % rankColors.length]);
    line.setAttribute('stroke-width', '0.8');
    svg.appendChild(line);
  }
  routeMap.appendChild(svg);
  chosenRoute.order.forEach((b, i) => {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.style.left = b.x + '%';
    pin.style.top = b.y + '%';
    pin.innerHTML = `<span class="dot" style="background:${rankColors[i % rankColors.length]}">${i + 1}</span>`;
    routeMap.appendChild(pin);
  });

  // 이동수단 결과 초기화
  document.getElementById('mode-tabs').classList.remove('show');
  document.getElementById('mode-result').style.display = 'none';
}

document.getElementById('time-toggle').addEventListener('click', () => {
  document.getElementById('mode-tabs').classList.add('show');
  showMode('walk');
});
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    showMode(tab.dataset.mode);
  });
});
function showMode(mode){
  const km = currentRoutes[activeRankIdx].dist * 0.35;
  const speeds = { walk: 4, car: 25, bus: 15 };
  const minutes = Math.max(1, Math.round((km / speeds[mode]) * 60));
  const labels = { walk: '도보', car: '자동차', bus: '버스' };
  const resultEl = document.getElementById('mode-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `${labels[mode]} 이동 시 약 ${minutes}분 소요<small>거리 기반 근사치입니다 (1차 구현). 이후 실제 API 연동 예정.</small>`;
}

/* ---------- 공유하기 / 코스 저장 ---------- */
document.getElementById('share-route-btn').addEventListener('click', () => {
  const chosenRoute = currentRoutes[activeRankIdx];
  if (!chosenRoute) return;
  const text = chosenRoute.order.map(b => b.name).join(' → ');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('링크가 복사되었습니다'));
  } else {
    showToast('이 환경에서는 클립보드 복사를 지원하지 않아요');
  }
});

const saveCourseModal = document.getElementById('save-course-modal');
document.getElementById('save-course-btn').addEventListener('click', () => {
  if (!currentRoutes[activeRankIdx]) return;
  document.getElementById('course-name-input').value = '';
  saveCourseModal.classList.add('show');
});
document.getElementById('course-cancel').addEventListener('click', () => saveCourseModal.classList.remove('show'));
document.getElementById('course-submit').addEventListener('click', () => {
  const chosenRoute = currentRoutes[activeRankIdx];
  if (!chosenRoute) return;
  const name = document.getElementById('course-name-input').value.trim() || `${chosenRoute.order[0].name} 코스`;
  savedCourses.push({ name, order: chosenRoute.order.map(b => b.id) });
  saveCourseModal.classList.remove('show');
  showToast('코스가 저장되었습니다');
  renderMypage();
});

function loadSavedCourse(course){
  selected.clear();
  course.order.forEach(id => selected.add(id));
  currentRoutes = computeTopRoutes();
  const target = course.order.map(id => bakeries.find(b => b.id === id));
  const idx = currentRoutes.findIndex(r => sameRoute(r.order, target));
  activeRankIdx = idx >= 0 ? idx : 0;
  renderRoute();
  syncSelectionUI();
  switchScreen('route');
}

/* ---------- 토스트 ---------- */
let toastTimer = null;
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

document.getElementById('chat-send').addEventListener('click', sendChat);
document.getElementById('chat-input-field').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
function sendChat(){
  const input = document.getElementById('chat-input-field');
  const text = input.value.trim();
  if (!text) return;
  const log = document.getElementById('chat-log');
  const userRow = document.createElement('div');
  userRow.className = 'bubble-row user';
  userRow.innerHTML = `<div class="bubble user"></div>`;
  userRow.querySelector('.bubble').textContent = text;
  log.appendChild(userRow);
  input.value = '';
  setTimeout(() => {
    const botRow = document.createElement('div');
    botRow.className = 'bubble-row bot';
    botRow.innerHTML = `<img class="mascot-icon" src="character.png" alt="빵지도 캐릭터"><div class="bubble bot"></div>`;
    botRow.querySelector('.bubble').textContent = '프로토타입 단계라 지금은 정해진 답변만 드려요. 실제 서비스에서는 취향에 맞는 빵집을 추천해드릴게요!';
    log.appendChild(botRow);
    log.scrollTop = log.scrollHeight;
  }, 400);
}

/* ---------- 마이페이지 ---------- */
let loggedInUser = null;
function renderMypage(){
  const el = document.getElementById('mypage-content');
  if (!loggedInUser) {
    el.innerHTML = `
      <div class="mypage-empty">
        <img class="mascot-icon" src="character.png" alt="빵지도 캐릭터">
        <p>로그인하면 내 정보와 빵 취향을 확인할 수 있어요.</p>
        <button class="btn-solid" id="mypage-login-btn">로그인하기</button>
      </div>`;
    document.getElementById('mypage-login-btn').addEventListener('click', () => loginModal.classList.add('show'));
    return;
  }

  const visitedCount = loggedInUser.visited.length;
  const stampTotal = 10;
  const stamps = Array.from({ length: stampTotal }, (_, i) => i < visitedCount);
  let badgeText = '아직 스탬프가 없어요. 첫 방문을 기록해보세요!';
  if (visitedCount >= 10) badgeText = '10곳 방문 — 빵지도 마스터';
  else if (visitedCount >= 5) badgeText = '5곳 방문 — 빵지도 초보 탐험가';
  else if (visitedCount >= 1) badgeText = `${visitedCount}곳 방문 — 빵지도 여정을 시작했어요`;

  const wishlistNames = [...new Set([
    ...loggedInUser.wishlist,
    ...[...wishlist].map(id => bakeries.find(b => b.id === id)?.name).filter(Boolean),
  ])];

  el.innerHTML = `
    <div class="profile-card">
      <h3>${loggedInUser.id}님</h3>
      <div class="detail-row"><span>빵 취향</span></div>
      <div class="tag-row">${loggedInUser.taste.map(t => `<span class="chip">${t}</span>`).join('') || '<span class="chip">선택 안 함</span>'}</div>
    </div>
    <div class="profile-card">
      <h3>가본 곳</h3>
      <div class="tag-row">${loggedInUser.visited.map(t => `<span class="chip">${t}</span>`).join('') || '<span class="chip">없음</span>'}</div>
    </div>
    <div class="profile-card">
      <h3>가고 싶은 곳</h3>
      <div class="tag-row">${wishlistNames.map(t => `<span class="chip">${t}</span>`).join('') || '<span class="chip">없음</span>'}</div>
    </div>
    <div class="profile-card stamp-card">
      <h3>스탬프 투어</h3>
      <div class="stamp-grid">
        ${stamps.map(on => `<span class="stamp ${on ? 'on' : ''}"><img class="mascot-icon" src="character.png" alt=""></span>`).join('')}
      </div>
      <p class="stamp-badge">${badgeText}</p>
    </div>
    <div class="profile-card">
      <h3>저장한 코스</h3>
      <div class="course-list" id="course-list">
        ${savedCourses.length ? savedCourses.map((c, i) => `<button type="button" class="course-item" data-idx="${i}"><span>${c.name}</span><span class="course-meta">${c.order.map(id => bakeries.find(b => b.id === id)?.name).join(' → ')}</span></button>`).join('') : '<p class="empty-note">아직 저장한 코스가 없어요.</p>'}
      </div>
    </div>
  `;

  el.querySelectorAll('.course-item').forEach(btn => {
    btn.addEventListener('click', () => loadSavedCourse(savedCourses[Number(btn.dataset.idx)]));
  });
}
